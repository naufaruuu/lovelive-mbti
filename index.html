const Icon = ({ name, size = 24, className = '', fill = 'none' }) => {

        xmlns: "http://www.w3.org/2000/svg", viewBox: "0 0 24 24", fill: fill, stroke: "currentColor",
        strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round", className: className, style: { width: size, height: size }
    };
    switch (name) {
        case 'star': return <svg {...svgProps}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg>;
        case 'star-filled': return <svg {...svgProps} fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg>;
        case 'rainbow': return <svg {...svgProps} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M2 17a10 10 0 0 1 20 0" /><path d="M5 17a7 7 0 0 1 14 0" /><path d="M8 17a4 4 0 0 1 8 0" /></svg>;
        case 'arrow-right': return <svg {...svgProps}><line x1="5" y1="12" x2="19" y2="12" /><polyline points="12 5 19 12 12 19" /></svg>;
        case 'chevron-left': return <svg {...svgProps}><polyline points="15 18 9 12 15 6" /></svg>;
        case 'chevron-right': return <svg {...svgProps}><polyline points="9 18 15 12 9 6" /></svg>;
        case 'users': return <svg {...svgProps}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>;
        case 'rotate-ccw': return <svg {...svgProps}><polyline points="1 4 1 10 7 10" /><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10" /></svg>;
        case 'trophy': return <svg {...svgProps}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 14.66V17c0 1.1-.9 2-2 2H6" /><path d="M14 14.66V17c0 1.1.9 2 2 2h2" /><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" /></svg>;
        case 'medal': return <svg {...svgProps}><path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15" /><path d="M11 12 5.12 2.2" /><path d="m13 12 5.88-9.8" /><path d="M8 7h8" /><circle cx="12" cy="17" r="5" /><polyline points="12 18 10.5 16.5 12 15" /></svg>;
        case 'info': return <svg {...svgProps}><circle cx="12" cy="12" r="10" /><line x1="12" y1="16" x2="12" y2="12" /><line x1="12" y1="8" x2="12.01" y2="8" /></svg>;
        case 'x': return <svg {...svgProps}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>;
        case 'globe': return <svg {...svgProps}><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>;
        case 'user': return <svg {...svgProps}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>;
        case 'moon': return <svg {...svgProps}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>;
        case 'sun': return <svg {...svgProps}><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></svg>;
        case 'ra-kana': return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" className={className} style={{ width: size, height: size }}><text x="12" y="19" textAnchor="middle" fontSize="19" fontWeight="900" fill="currentColor" stroke="none" fontFamily="sans-serif">ラ</text></svg>;
        default: return null;

};

const Avatar = ({ char, lang, isLarge = false }) => {
  const hasImage = char.image && char.image.trim() !== '';
  return (
    <div className="relative w-full h-full flex flex-col items-center justify-center text-center overflow-hidden bg-slate-50 dark:bg-slate-900">
      {/* Vibrant Base Color */}
      <div className={`absolute inset-0 ${char.color} opacity-60 dark:opacity-80 z-0 transition-colors duration-300`}></div>
      {/* Glossy Overlay */}
      <div className="absolute inset-0 bg-gradient-to-tr from-white/60 via-white/0 to-white/20 dark:from-black/60 dark:via-black/0 dark:to-black/20 z-0"></div>
      <div className="absolute bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-black/20 dark:from-black/50 to-transparent z-0"></div>
      
      {hasImage && (
        <img 
          src={char.image} 
          alt={char.name[lang]} 
          className="absolute inset-0 w-full h-full object-cover z-10 drop-shadow-[0_10px_10px_rgba(0,0,0,0.3)]" 
          onError={(e) => { e.target.style.display = 'none'; }}
        />
      )}
      {!hasImage && (
        <div className="z-10 flex flex-col items-center justify-center w-full h-full">
          <span className={isLarge ? "text-xs font-bold text-white drop-shadow-md" : "text-[8px] leading-tight font-bold text-white drop-shadow-md"}>

};

const parseBgHex = (colorClass) => {
  const match = colorClass.match(/bg-\[([^\]]+)\]/);
  return match ? match[1] : '#6b7280';
};

const isDarkFg = (hex) => {
  if (!hex || hex.length < 7) return false;
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return (r * 299 + g * 587 + b * 114) / 1000 > 150;
};

const SyncArc = ({ pct, color, size = 30 }) => {
  const r = (size - 5) / 2;
  const circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)', flexShrink: 0 }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(128,128,128,0.15)" strokeWidth="3.5" />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="3.5"
        strokeDasharray={`${dash} ${circ - dash}`} strokeLinecap="round" />
    </svg>
  );
};

const parseCharColor = (textClass, dark = false) => {
  if (dark) {
    const darkMatch = textClass.match(/dark:text-\[([^\]]+)\]/);
    if (darkMatch) return darkMatch[1];
  }
  const lightMatch = textClass.replace(/dark:[^\s]+/g, '').match(/text-\[([^\]]+)\]/);
  return lightMatch ? lightMatch[1] : '#6b7280';
};

const RadarChart = ({ userTraits, charTraits, charColor, size = 280, lang, isDark }) => {
  const center = size / 2;
  const radius = (size / 2) * 0.65; 
  const dims = ['E', 'J', 'T', 'C', 'M', 'O', 'A', 'U', 'N']; 
  const labels = T[lang].dims;
  
  const getPoint = (value, index, total) => {
    const scaledValue = ((value + 10) / 20) * radius;
    const angle = (Math.PI * 2 * index) / total - Math.PI / 2;
    return {
      x: center + scaledValue * Math.cos(angle),
      y: center + scaledValue * Math.sin(angle)
    };
  };

  const getPointsString = (traitsObj) => {
    return dims.map((dim, i) => {
      const p = getPoint(traitsObj[dim], i, dims.length);
      return `${p.x},${p.y}`;
    }).join(' ');
  };

  const bgPolygons = [1, 0.75, 0.5, 0.25].map(scale => {
    const pts = dims.map((_, i) => {
      const angle = (Math.PI * 2 * i) / dims.length - Math.PI / 2;
      const r = radius * scale;
      return `${center + r * Math.cos(angle)},${center + r * Math.sin(angle)}`;
    }).join(' ');
    return <polygon key={scale} points={pts} fill="none" stroke={isDark ? "#334155" : "#e2e8f0"} strokeWidth="1" />;
  });

  return (
    <div className="relative flex justify-center items-center my-4 transition-all duration-300">
      <svg width={size} height={size} className="overflow-visible">
        {bgPolygons}
        {dims.map((_, i) => {
          const p = getPoint(10, i, dims.length); 
          return <line key={`axis-${i}`} x1={center} y1={center} x2={p.x} y2={p.y} stroke={isDark ? "#1e293b" : "#f1f5f9"} strokeWidth="1.5" />;
        })}
        <polygon points={getPointsString(userTraits)} fill={isDark ? "rgba(148, 163, 184, 0.15)" : "rgba(148, 163, 184, 0.25)"} stroke={isDark ? "#475569" : "#64748b"} strokeWidth="2" strokeDasharray="4 4" />
        <polygon points={getPointsString(charTraits)} fill={charColor} fillOpacity={0.55} stroke={charColor} strokeWidth="2.5" />
        {dims.map((dim, i) => {
          const angle = (Math.PI * 2 * i) / dims.length - Math.PI / 2;
          const labelRadius = radius + (size * 0.12); 
          const x = center + labelRadius * Math.cos(angle);
          const y = center + labelRadius * Math.sin(angle);
          return (
            <text key={`label-${i}`} x={x} y={y} textAnchor="middle" dominantBaseline="middle" className={`font-bold ${isDark ? 'fill-slate-400' : 'fill-slate-500'} ${size < 240 ? 'text-[10px]' : 'text-xs'}`}>
              {labels[i]}
            </text>
          );
        })}
      </svg>
    </div>
  );
};

const RankBadge = ({ rank }) => {
  if (rank === 1) return <div className="bg-yellow-400 text-white w-10 h-10 rounded-full flex items-center justify-center font-black shadow-md shrink-0"><Icon name="trophy" size={22}/></div>;
  if (rank === 2) return <div className="bg-slate-300 dark:bg-slate-600 text-slate-700 dark:text-slate-200 w-10 h-10 rounded-full flex items-center justify-center font-black shadow-md shrink-0"><Icon name="trophy" size={22}/></div>;
  if (rank === 3) return <div className="bg-amber-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-black shadow-md shrink-0"><Icon name="trophy" size={22}/></div>;
  return <div className="bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 w-10 h-10 rounded-full flex items-center justify-center font-bold shrink-0">{rank}</div>;
};

const ExportCards = ({ top3, userMbti, lang, userTraits }) => {

  const renderCard = (char, rank) => (

      <div className="flex items-center justify-between mb-4 mt-2">
        <div className="flex items-center gap-3">
          <RankBadge rank={rank} />
          <div>
            <h4 className={`text-xl font-bold ${char.text}`}>{char.name[lang]}</h4>
            {char.mbti && <span className={`inline-block text-sm font-black tracking-wider px-2 py-0.5 rounded-full border mt-0.5 ${char.border} ${char.bgLight} ${char.text}`}>{char.mbti.type}</span>}
            <div className="mt-1">
              <span className="text-sm font-bold text-slate-500 bg-slate-50 px-2 py-0.5 rounded-full">{T[lang].matchRate} {char.matchRate}%</span>
            </div>
          </div>
        </div>
        <div className={`w-16 h-16 rounded-full overflow-hidden border-2 ${char.border} bg-slate-50 flex flex-col items-center justify-center`}>
           <Avatar char={char} lang={lang} />
        </div>
      </div>
      <div className="flex-1 flex flex-col items-center justify-center -mt-2">
         <RadarChart userTraits={userTraits} charTraits={char._traitScores} charColor={parseCharColor(char.text, false)} size={220} lang={lang} isDark={false} />
      </div>
    </div>
  );

  return (
    <div style={{ position: 'absolute', left: '-9999px', top: '-9999px', opacity: 0, pointerEvents: 'none' }}>
      {/* 16:9 Landscape - roughly 1280x720 */}
      <div id="export-card-16-9" className="bg-slate-50 font-sans p-8 flex flex-col relative" style={{ width: '1280px', height: '720px' }}>
        <div className="flex justify-between items-end mb-8 z-10">
           <div>
             <h1 className="text-4xl font-black text-slate-800">{T[lang].appTitle}</h1>
             <p className="text-2xl text-slate-500 font-bold mt-2">{T[lang].appSubtitle}</p>
           </div>
           <div className="text-right">
             <p className="text-xl text-slate-500 font-bold mb-1 uppercase tracking-widest">{T[lang].yourMbti}</p>
             <div className="text-5xl font-black text-slate-800 tracking-widest">{userMbti}</div>
           </div>
        </div>
        <div className="flex gap-6 flex-1 z-10">
          {top3.map((c, i) => <div key={c.id} className="flex-1 flex">{renderCard(c, i+1)}</div>)}
        </div>
        {/* Subtle background decoration */}
        <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-orange-400 rounded-full blur-[120px] opacity-10"></div>
        <div className="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-pink-500 rounded-full blur-[120px] opacity-10"></div>
      </div>

      {/* 9:16 Portrait - roughly 1080x1920 */}
      <div id="export-card-9-16" className="bg-slate-50 font-sans p-10 flex flex-col relative" style={{ width: '1080px', height: '1920px' }}>
        <div className="text-center mb-10 mt-10 z-10">
           <h1 className="text-5xl font-black text-slate-800">{T[lang].appTitle}</h1>
           <p className="text-3xl text-slate-500 font-bold mt-4">{T[lang].appSubtitle}</p>
           <div className="mt-12 bg-white rounded-3xl p-8 shadow-sm inline-block border border-slate-100">
             <p className="text-2xl text-slate-500 font-bold mb-2 uppercase tracking-widest">{T[lang].yourMbti}</p>
             <div className="text-7xl font-black text-slate-800 tracking-widest">{userMbti}</div>
           </div>
        </div>
        <div className="flex flex-col gap-8 flex-1 z-10">
          {top3.map((c, i) => <div key={c.id} className="flex-1 flex">{renderCard(c, i+1)}</div>)}
        </div>
        {/* Subtle background decoration */}
        <div className="absolute top-[-10%] right-[-20%] w-[60%] h-[40%] bg-orange-400 rounded-full blur-[150px] opacity-10"></div>
        <div className="absolute bottom-[-10%] left-[-20%] w-[60%] h-[40%] bg-pink-500 rounded-full blur-[150px] opacity-10"></div>
      </div>
    </div>
  );
};

function App() {
  const [appState, setAppState] = useState('start'); 
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState(Array(QUESTIONS.length).fill(null));
  const [userTraits, setUserTraits] = useState({ E: 0, J: 0, T: 0, C: 0, M: 0, O: 0, A: 0, U: 0, N: 0 });
  const [userMbti, setUserMbti] = useState('');
  const [matchList, setMatchList] = useState([]); 
  const [showReadme, setShowReadme] = useState(false);
  const [lang, setLang] = useState('en');
  const [isDark, setIsDark] = useState(false);
  const [isExporting, setIsExporting] = useState(false);
  const [selectedGroups, setSelectedGroups] = useState({ nijigasaki: true, hasunosora: true, aqours: true, muse: true, liella: true });
  const [showGroups, setShowGroups] = useState(false);
  const [detailsChar, setDetailsChar] = useState(null);
  const [showSkipConfirm, setShowSkipConfirm] = useState(false);

  useEffect(() => {
    if (isDark) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  }, [isDark]);

  const quizQuestions = useMemo(() => QUESTIONS, []);
  const visibleMatchList = useMemo(
    () => matchList.filter(c => selectedGroups[c.group]),
    [matchList, selectedGroups]
  );

  const toggleGroup = (group) => {
    setSelectedGroups(prev => {
      const next = { ...prev, [group]: !prev[group] };
      const anyOn = Object.values(next).some(Boolean);
      return anyOn ? next : prev;
    });
  };

  const handleStart = () => {
    setAppState('quiz');
    setCurrentQ(0);
    setAnswers(Array(quizQuestions.length).fill(null));
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const handleExport = async (format) => {
    setIsExporting(true);
    try {
      const elementId = format === '16:9' ? 'export-card-16-9' : 'export-card-9-16';
      const element = document.getElementById(elementId);
      if (!element) return;
      
      const canvas = await html2canvas(element, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#f8fafc' // slate-50
      });
      
      const image = canvas.toDataURL("image/png");
      const link = document.createElement('a');
      link.href = image;
      link.download = `lovelive-mbti-${format.replace(':', 'x')}.png`;
      link.click();
    } catch (err) {
      console.error('Export failed:', err);
      alert('Export failed. Please try again.');
    } finally {
      setIsExporting(false);
    }
  };

  const handleAnswer = (optionValue) => {
    const newAnswers = [...answers];
    newAnswers[currentQ] = optionValue;
    setAnswers(newAnswers);
    if (currentQ < quizQuestions.length - 1) {
      setTimeout(() => setCurrentQ(currentQ + 1), 150); 
    } else {
      calculateResult(newAnswers);
    }
  };

  const handlePrev = () => {
    if (currentQ > 0) setCurrentQ(currentQ - 1);
  };

  const handleNextQuestion = () => {
    if (currentQ < quizQuestions.length - 1) {
      setCurrentQ(currentQ + 1);
    } else {
      setShowSkipConfirm(true);
    }
  };

  const handleSkip = () => {
    setShowSkipConfirm(false);
    const randomAnswers = quizQuestions.map(() => OPTION_VALUES[Math.floor(Math.random() * OPTION_VALUES.length)]);
    setAnswers(randomAnswers);
    calculateResult(randomAnswers);
  };

  const calculateResult = (finalAnswers) => {
    let rawScores = { E: 0, J: 0, T: 0, C: 0, M: 0, O: 0, A: 0, U: 0, N: 0 };
    const dims = ['E', 'J', 'T', 'C', 'M', 'O', 'A', 'U', 'N'];
    quizQuestions.forEach((q, index) => {
      const val = finalAnswers[index];
      if (val !== null) {
        rawScores[q.dim] += val * q.sign;
      }
    });
    const mbti =
      (rawScores.E > 0 ? 'E' : 'I') +
      (rawScores.N > 0 ? 'N' : 'S') +
      (rawScores.T > 0 ? 'T' : 'F') +
      (rawScores.J > 0 ? 'J' : 'P');
    setUserMbti(mbti);

    const boostedScores = { ...rawScores };
    setUserTraits(boostedScores);

    const userRankedDims = dims
      .map(d => ({ d, score: boostedScores[d] }))
      .sort((a, b) => Math.abs(b.score) - Math.abs(a.score))
      .slice(0, 3);

    let rawCharScores = CHARACTERS.map(char => {
      const charTraitScores = {};
      dims.forEach(d => { charTraitScores[d] = char.mbti.traits[d].score; });
      let dot = 0, uNorm = 0, cNorm = 0;
      dims.forEach(d => {
        const uVal = boostedScores[d];
        const cVal = charTraitScores[d];
        dot += uVal * cVal;
        uNorm += uVal * uVal;
        cNorm += cVal * cVal;
      });
      uNorm = Math.sqrt(uNorm);
      cNorm = Math.sqrt(cNorm);

      // Cosine: keep full [-1, 1] range, then remap to [0, 1] for blending.
      // Direction-of-personality match — the dominant signal for character matching.
      const rawCosine = (uNorm === 0 || cNorm === 0) ? 0 : (dot / (uNorm * cNorm));
      const cosineNorm = (rawCosine + 1) / 2;

      // Scale-invariant Euclidean: rescale the user vector to the character's magnitude
      // before computing distance. Otherwise mild-answering users always look "far" from
      // every character (Love Live cast clusters at high |score|), and the ranking gets
      // dominated by whoever happens to be least extreme.
      const scale = uNorm > 0 ? cNorm / uNorm : 1;
      let scaledSumSq = 0;
      dims.forEach(d => {
        const su = boostedScores[d] * scale;
        scaledSumSq += Math.pow(su - charTraitScores[d], 2);
      });
      const scaledDist = Math.sqrt(scaledSumSq);
      const euclideanSim = Math.exp(-(scaledDist * scaledDist) / 400);

      // Top-3 dominant-trait alignment: rewards characters who match the user's
      // strongest 3 traits in direction. Smoother and more interpretable than the
      // old single-dim synergy bonus, which could swing 0-5 pts based on which
      // trait happened to win by 1 point.
      let dominantBonus = 0;
      userRankedDims.forEach(({ d, score }) => {
        const cVal = charTraitScores[d];
        if (score !== 0 && cVal !== 0 && Math.sign(score) === Math.sign(cVal)) {
          dominantBonus += Math.min(Math.abs(cVal), Math.abs(score)) / 10 * 2;
        }
      });

      // Weights: cosine leads (direction matters most), Euclidean is the tie-breaker
      // (rewards similar intensity), dominant alignment is a small interpretable bonus,
      // baseline keeps top matches in the satisfying 75-99% range.
      const finalRate = (cosineNorm * 55) + (euclideanSim * 35) + dominantBonus + 5;
      return { ...char, _traitScores: charTraitScores, distance: scaledDist, rawRate: finalRate };
    });

    let scores = rawCharScores.map(char => {
      return { ...char, matchRate: Math.min(99.9, Math.max(0, char.rawRate)).toFixed(1) };
    });

    scores.sort((a, b) => b.matchRate - a.matchRate);
    setMatchList(scores);
    setAppState('result');
    window.scrollTo({ top: 0, behavior: 'smooth' });

          </div>
          <div className="h-2 bg-slate-200 dark:bg-slate-800 rounded-full w-full mb-10 overflow-hidden shadow-inner">
            <div className="h-full bg-gradient-to-r from-orange-400 to-pink-500 transition-all duration-500 ease-out rounded-full" style={{ width: `${progress}%` }}></div>
          </div>
          <div className="bg-white dark:bg-slate-800 rounded-[2rem] shadow-xl p-8 md:p-10 mb-8 border border-slate-100 dark:border-slate-700 relative">
            <div className="absolute top-8 left-6 text-slate-200 dark:text-slate-700 opacity-50"><span className="text-6xl font-serif">"</span></div>
            <h2 className="text-xl md:text-2xl font-medium leading-relaxed h-40 md:h-32 text-slate-700 dark:text-slate-200 relative z-10 flex items-center">
              {question.text[lang]}
            </h2>
          </div>
          <div className="space-y-3 md:space-y-4">
            {T[lang].options.map((optText, idx) => {
              const optValue = OPTION_VALUES[idx];
              const isSelected = answers[currentQ] === optValue;
              return (
                <button key={idx} onClick={() => handleAnswer(optValue)} className={`w-full py-4 md:py-5 px-6 text-center rounded-2xl font-bold transition-all duration-200 active:scale-95 text-sm md:text-base ${isSelected ? 'bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-900 shadow-lg ring-2 ring-slate-800 dark:ring-slate-200 ring-offset-2 dark:ring-offset-slate-900' : 'bg-white dark:bg-slate-800/50 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800 shadow-sm'}`}>
                  {optText}
                </button>
              );
            })}
          </div>
        </div>
        <FooterPill />
      </div>
    );
  }

  if (appState === 'result' && matchList.length > 0) {
    const topChar = visibleMatchList[0] || matchList[0];
    const top3 = visibleMatchList.slice(0, 3);
    return (
      <div className="min-h-screen bg-slate-100 dark:bg-slate-900 flex flex-col items-center justify-center gap-4 px-4 py-8 md:p-6 font-sans overflow-x-hidden relative transition-colors duration-300">
        <TopLeftControls />
        <ReadmeModal />
        <GroupModal />
        <DetailsModal />
        <div className="max-w-xl w-full bg-white dark:bg-slate-800 rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-700">
          <div className={`pt-12 pb-24 px-6 text-center ${topChar.bgLight} dark:bg-opacity-10 relative border-b border-white/50 dark:border-slate-700`}>
            <p className="text-xs font-extrabold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2 opacity-80">{T[lang].bestMatch}</p>
            <h2 className={`text-4xl md:text-5xl font-black tracking-tight ${topChar.text} mb-2`}>{topChar.name[lang]}</h2>
          </div>
          <div className="px-8 -mt-20 relative z-10 flex justify-center">
            <div className={`w-36 h-36 md:w-44 md:h-44 rounded-[2rem] shadow-2xl flex items-center justify-center bg-white dark:bg-slate-800 border-4 ${topChar.border} overflow-hidden`}>
               <Avatar char={topChar} lang={lang} isLarge={true} />
            </div>
          </div>
          <div className="p-6 md:p-10 pt-6 text-center">
            <div className="bg-slate-50 dark:bg-slate-900/50 p-5 rounded-2xl mb-6 border border-slate-100 dark:border-slate-700 shadow-sm text-left">
              <p className="text-slate-600 dark:text-slate-300 leading-relaxed text-sm md:text-base font-medium">{topChar.desc[lang]}</p>
            </div>
            {userMbti && (
              <div className="flex items-center justify-center gap-3 mb-8">
                <div className="flex flex-col items-center gap-1">
                  <span className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">{T[lang].yourMbti}</span>
                  <span className="text-2xl font-black tracking-widest text-slate-800 dark:text-slate-100 bg-slate-100 dark:bg-slate-700 px-5 py-2 rounded-xl border border-slate-200 dark:border-slate-600">{userMbti}</span>
                </div>
                <div className="text-slate-300 dark:text-slate-600 text-2xl font-thin">↔</div>
                <div className="flex flex-col items-center gap-1">
                  <span className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">{T[lang].mbtiMatch}</span>
                  <span className={`text-2xl font-black tracking-widest px-5 py-2 rounded-xl border ${topChar.border} ${topChar.bgLight} ${topChar.text}`}>{topChar.mbti.type}</span>
                </div>
              </div>
            )}
            <div className="mb-8">
              <h3 className="text-xl font-black text-slate-800 dark:text-slate-100 mb-6 flex items-center justify-center gap-2"><Icon name="users" className="text-orange-400" size={24}/> {T[lang].top3Title}</h3>
              <div className="space-y-8">
                {top3.map((char, index) => (
                  <div key={char.id}
                    className="char-card bg-white dark:bg-slate-800 rounded-3xl shadow-sm overflow-hidden flex flex-col"
                    style={{ border: `1px solid ${parseBgHex(char.color)}50`, '--card-glow': `${parseBgHex(char.color)}40` }}
                  >
                    {/* Header */}
                    <div className="relative" style={{ backgroundColor: `${parseBgHex(char.color)}${isDark ? '33' : '1a'}` }}>
                      <div className={`absolute top-0 left-0 w-full h-[5px] ${char.color}`} />
                      <div className="px-5 pt-5 pb-3 flex items-start justify-between gap-3">
                        <div className="flex items-center gap-3">
                          <RankBadge rank={index + 1} />
                          <div>
                            <h4 className={`text-lg font-bold ${char.text}`}>{char.name[lang]}</h4>
                            <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
                              {char.mbti && (() => { const hex = parseBgHex(char.color); return <span style={{ backgroundColor: hex, color: isDarkFg(hex) ? '#1e293b' : 'white' }} className="inline-block text-xs font-black tracking-wider px-2 py-0.5 rounded-full">{char.mbti.type}</span>; })()}
                              <span className="inline-flex items-center gap-1">
                                <SyncArc pct={parseFloat(char.matchRate)} color={parseBgHex(char.color)} size={28} />
                                <span className={`text-xs font-bold ${char.text}`}>{char.matchRate}%</span>
                              </span>
                            </div>
                          </div>
                        </div>
                        <div className={`w-14 h-14 rounded-2xl overflow-hidden border-2 ${char.border} shrink-0 bg-slate-50 dark:bg-slate-900/50`}>
                          <Avatar char={char} lang={lang} />
                        </div>
                      </div>
                    </div>
                    {/* Description */}
                    {char.desc && char.desc[lang] && (
                      <div className="mx-5 mt-3 mb-1 rounded-2xl px-3 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-100 dark:border-slate-700/50">
                        <p className="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">{char.desc[lang]}</p>
                      </div>
                    )}
                    {/* Spacer — pushes chart+button to bottom */}
                    <div className="flex-1" />
                    {/* Legend + Chart + Button */}
                    <div className="flex flex-col items-center px-5 pb-5">
                      <div className="flex justify-center gap-4 text-[10px] text-slate-400 dark:text-slate-500 mb-[-10px]">
                        <div className="flex items-center gap-1"><span className="w-2.5 h-2.5 border border-slate-400 dark:border-slate-600 border-dashed bg-slate-200 dark:bg-slate-700 opacity-50 rounded-sm"></span> {T[lang].you}</div> 
                        <div className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm" style={{ backgroundColor: parseCharColor(char.text, isDark), opacity: 0.6 }}></span> {char.name[lang]}</div>
                      </div>
                      <RadarChart userTraits={userTraits} charTraits={char._traitScores} charColor={parseCharColor(char.text, isDark)} size={250} lang={lang} isDark={isDark} />
                      <button onClick={() => setDetailsChar(char)} className={`w-full py-2.5 rounded-xl text-sm font-bold border-2 transition-all active:scale-95 ${char.bgLight} ${char.text} ${char.border} hover:opacity-80`}>
                        {T[lang].detailsBtn}
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="space-y-3">
              <button onClick={() => { setAppState('allProfiles'); window.scrollTo(0,0); }} className="w-full py-4 bg-orange-100 dark:bg-orange-900/30 hover:bg-orange-200 dark:hover:bg-orange-900/50 text-orange-600 dark:text-orange-400 font-bold rounded-2xl transition-colors active:scale-95 flex items-center justify-center gap-2">
                {T[lang].viewAllBtn} <Icon name="arrow-right" size={18} />
              </button>
              <div className="hidden grid-cols-2 gap-2">
                <button onClick={() => handleExport('16:9')} disabled={isExporting} className="w-full py-3 bg-violet-100 dark:bg-violet-900/30 hover:bg-violet-200 dark:hover:bg-violet-900/50 text-violet-600 dark:text-violet-400 font-bold rounded-2xl transition-colors active:scale-95 flex items-center justify-center gap-2 text-sm disabled:opacity-50">
                  <Icon name="star" size={15} /> {isExporting ? '...' : 'Export 16:9'}
                </button>
                <button onClick={() => handleExport('9:16')} disabled={isExporting} className="w-full py-3 bg-violet-100 dark:bg-violet-900/30 hover:bg-violet-200 dark:hover:bg-violet-900/50 text-violet-600 dark:text-violet-400 font-bold rounded-2xl transition-colors active:scale-95 flex items-center justify-center gap-2 text-sm disabled:opacity-50">
                  <Icon name="star" size={15} /> {isExporting ? '...' : 'Export 9:16'}
                </button>
              </div>
              <button onClick={handleStart} className="w-full py-4 bg-slate-900 dark:bg-slate-100 hover:bg-slate-800 dark:hover:bg-white text-white dark:text-slate-900 font-bold rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2">
                <Icon name="rotate-ccw" size={18} /> {T[lang].restartBtn}
              </button>
            </div>
            <ExportCards top3={top3} userMbti={userMbti} lang={lang} userTraits={userTraits} />
          </div>
        </div>
        <FooterPill />
      </div>
    );
  }

  if (appState === 'allProfiles') {
    return (
      <div className="min-h-screen bg-slate-100 dark:bg-slate-900 flex flex-col items-center p-4 md:p-6 font-sans transition-colors duration-300">
        <TopLeftControls />
        <ReadmeModal />
        <GroupModal />
        <DetailsModal />
        <div className="max-w-2xl w-full mt-4">
          <div className="flex items-center mb-6">
            <button onClick={() => { setAppState('result'); window.scrollTo(0,0); }} className="w-11 h-11 flex items-center justify-center rounded-full transition-all duration-200 shadow border bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 border-slate-200 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-600 hover:shadow-md hover:text-orange-500 active:scale-95 mr-4 shrink-0">
              <Icon name="chevron-left" size={22} />
            </button>
            <div>
              <h2 className="text-2xl font-black text-slate-800 dark:text-slate-100">{T[lang].allProfilesTitle}</h2>
              <p className="text-sm text-slate-500 dark:text-slate-400 font-medium">{T[lang].allProfilesSub}</p>
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {visibleMatchList.map((char, index) => (
              <div key={char.id}
                className="char-card bg-white dark:bg-slate-800 rounded-3xl shadow-sm flex flex-col overflow-hidden"
                style={{ border: `1px solid ${parseBgHex(char.color)}50`, '--card-glow': `${parseBgHex(char.color)}40` }}
              >
                {/* Header */}
                <div className="relative" style={{ backgroundColor: `${parseBgHex(char.color)}${isDark ? '33' : '1a'}` }}>
                  <div className={`absolute top-0 left-0 w-full h-[5px] ${char.color}`} />
                  <div className="px-4 pt-5 pb-3 flex items-center justify-between gap-3">
                    <div className="flex items-center gap-2.5">
                      <span className={`font-black text-base min-w-[2rem] text-right leading-none opacity-50 ${char.text}`}>#{index + 1}</span>
                      <div>
                        <h4 className={`text-base font-black ${char.text}`}>{char.name[lang]}</h4>
                        <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
                          {char.mbti && (() => { const hex = parseBgHex(char.color); return <span style={{ backgroundColor: hex, color: isDarkFg(hex) ? '#1e293b' : 'white' }} className="text-xs font-black tracking-wider px-2 py-0.5 rounded-full">{char.mbti.type}</span>; })()}
                          <span className="inline-flex items-center gap-1">
                            <SyncArc pct={parseFloat(char.matchRate)} color={parseBgHex(char.color)} size={26} />
                            <span className={`text-xs font-bold ${char.text}`}>{char.matchRate}%</span>
                          </span>
                        </div>
                      </div>
                    </div>
                    <div className={`w-12 h-12 rounded-2xl overflow-hidden border-2 ${char.border} shrink-0 bg-slate-50 dark:bg-slate-900/50`}>
                      <Avatar char={char} lang={lang} />
                    </div>
                  </div>
                </div>
                {/* Description */}
                {char.desc && char.desc[lang] && (
                  <div className="mx-4 mt-3 mb-1 rounded-2xl px-3 py-2.5 bg-slate-50 dark:bg-slate-900/50 border border-slate-100 dark:border-slate-700/50">
                    <p className="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">{char.desc[lang]}</p>
                  </div>
                )}
                {/* Spacer — pushes chart+button to bottom */}
                <div className="flex-1" />
                {/* Legend + Chart + Button */}
                <div className="flex flex-col items-center px-3 pb-4">
                  <div className="flex justify-center gap-4 text-[10px] text-slate-400 dark:text-slate-500 mt-2 mb-[-8px]">
                    <div className="flex items-center gap-1"><span className="w-2 h-2 border border-slate-400 dark:border-slate-600 border-dashed bg-slate-200 dark:bg-slate-700 opacity-50 rounded-sm"></span> {T[lang].you}</div>
                    <div className="flex items-center gap-1"><span className="w-2 h-2 rounded-sm" style={{ backgroundColor: parseCharColor(char.text, isDark), opacity: 0.6 }}></span> {char.name[lang]}</div>
                  </div>
                  <RadarChart userTraits={userTraits} charTraits={char._traitScores} charColor={parseCharColor(char.text, isDark)} size={220} lang={lang} isDark={isDark} />
                  <button onClick={() => setDetailsChar(char)} className={`w-full py-2.5 rounded-xl text-sm font-bold border-2 transition-all active:scale-95 ${char.bgLight} ${char.text} ${char.border} hover:opacity-80`}>
                    {T[lang].detailsBtn}
                  </button>
                </div>
              </div>
            ))}
          </div>
          <div className="mt-8 text-center">
             <button onClick={() => { setAppState('result'); window.scrollTo(0,0); }} className="py-4 px-8 bg-slate-900 dark:bg-slate-100 hover:bg-slate-800 dark:hover:bg-white text-white dark:text-slate-900 font-bold rounded-2xl shadow-xl transition-all active:scale-95 inline-flex items-center justify-center gap-2">
                <Icon name="chevron-left" size={18} /> {T[lang].backBtn}
              </button>
          </div>
        </div>
        <FooterPill />
      </div>
    );
  }
  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
